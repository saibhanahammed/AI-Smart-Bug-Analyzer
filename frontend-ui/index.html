<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Smart Bug Analyzer - Dashboard Panel</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 font-sans antialiased">
    <div id="root"></div>

    <script type="text/babel">
        function App() {
            const [selectedFile, setSelectedFile] = React.useState(null);
            const [isUploading, setIsUploading] = React.useState(false);
            const [pipelineData, setPipelineData] = React.useState(null);

            const handleFileChange = (e) => {
                if (e.target.files[0]) {
                    setSelectedFile(e.target.files[0]);
                    setPipelineData(null);
                }
            };

           const submitLogFile = async () => {
    if (!selectedFile) {
        alert("Please select a diagnostic bug log file to execute pipeline ingestion.");
        return;
    }

    setIsUploading(true); // Ensure lowercase 'true'
    const formData = new FormData();
    formData.append("file", selectedFile);

    try {
        const response = await fetch("http://127.0.0.1:8000/api/v1/analyze-log", {
            method: "POST",
            body: formData
        });
        const data = await response.json();
        setPipelineData(data);
    } catch (err) {
        alert("Failed to communicate with the FastAPI backend engine service.");
    } finally {
        setIsUploading(false); // Ensure lowercase 'false'
    }
};

            return (
                <div class="min-h-screen flex flex-col bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-blue-950/30 via-slate-950 to-slate-950">
                    <header class="border-b border-slate-800 bg-slate-900/60 p-5 flex justify-between items-center">
                        <div>
                            <h1 class="text-lg font-bold text-white tracking-tight">AI Smart Bug Analyzer Dashboard</h1>
                            <p class="text-xs text-slate-400">Milestone 1 Working Foundation • Connected via Asynchronous Python Service Layer</p>
                        </div>
                        <span class="text-xs font-mono bg-slate-900 border border-slate-800 px-3 py-1 rounded text-slate-400">
                            Repository: saibhanahammed/AI-Smart-Bug-Analyzer
                        </span>
                    </header>

                    <main class="flex-1 p-6 max-w-6xl w-full mx-auto space-y-6">
                        
                        {/* File Upload Component Box */}
                        <div class="bg-slate-900/40 border border-slate-800 p-6 rounded-xl space-y-4">
                            <h3 class="text-xs font-bold uppercase tracking-wider text-slate-400">Bug Submission Module (Telemetry File Intake)</h3>
                            
                            <div class="flex flex-col items-center justify-center border-2 border-dashed border-slate-800 hover:border-blue-800 rounded-lg p-8 bg-slate-950 transition-all">
                                <input type="file" id="logFileInput" accept=".log,.txt" onChange={handleFileChange} class="hidden" />
                                <label htmlFor="logFileInput" class="cursor-pointer bg-blue-600 hover:bg-blue-500 text-white text-xs font-semibold px-4 py-2 rounded shadow-md transition-all">
                                    Choose Telemetry Log File (.log, .txt)
                                </label>
                                {selectedFile && (
                                    <span class="text-xs font-mono text-blue-400 mt-3 font-semibold">Selected: {selectedFile.name} ({(selectedFile.size / 1024).toFixed(2)} KB)</span>
                                )}
                            </div>

                            <div class="flex justify-end">
                                <button onClick={submitLogFile} disabled={isUploading || !selectedFile} class="bg-blue-600 hover:bg-blue-500 disabled:bg-slate-800 text-white font-bold text-xs px-5 py-2.5 rounded-lg transition-all shadow-lg">
                                    {isUploading ? "Executing Data Framework..." : "Upload & Analyze Log"}
                                </button>
                            </div>
                        </div>

                        {/* Pipeline Telemetry Metric Outputs */}
                        {pipelineData && (
                          <div class="space-y-6 animate-fade-in">
                            
                            {/* Ingestion metrics */}
                            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                                <div class="bg-slate-900 p-4 rounded-lg border border-slate-800">
                                    <span class="text-[10px] text-slate-500 font-mono block uppercase">Data Ingestion Rate</span>
                                    <div class="text-xl font-bold font-mono mt-1 text-white">{pipelineData.pipeline_metrics.raw_character_count} Characters</div>
                                </div>
                                <div class="bg-slate-900 p-4 rounded-lg border border-slate-800">
                                    <span class="text-[10px] text-slate-500 font-mono block uppercase">Preprocessing Reductions</span>
                                    <div class="text-xl font-bold font-mono mt-1 text-emerald-400">Cleaned Down to {pipelineData.pipeline_metrics.cleaned_character_count}</div>
                                </div>
                                <div class="bg-slate-900 p-4 rounded-lg border border-slate-800">
                                    <span class="text-[10px] text-slate-500 font-mono block uppercase">Recursive Token Spaces</span>
                                    <div class="text-xl font-bold font-mono mt-1 text-blue-400">{pipelineData.pipeline_metrics.total_chunks_generated} Chunks Indexed</div>
                                </div>
                            </div>

                            {/* Processing Lane Components */}
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div class="bg-slate-900 p-4 rounded-lg border border-slate-800 space-y-2">
                                    <span class="text-xs font-mono font-bold text-slate-400 block uppercase">Data Preprocessing &amp; Cleaning Output:</span>
                                    <p class="text-xs font-mono text-slate-300 bg-slate-950 p-3 rounded border border-slate-850 max-h-36 overflow-y-auto leading-relaxed">
                                        {pipelineData.data_stages.cleaned_text}
                                    </p>
                                </div>
                                <div class="bg-slate-900 p-4 rounded-lg border border-slate-800 space-y-2">
                                    <span class="text-xs font-mono font-bold text-slate-400 block uppercase">Recursive Character Text Chunking Windows:</span>
                                    <div class="max-h-36 overflow-y-auto space-y-1.5">
                                        {pipelineData.data_stages.chunks.map((ch, idx) => (
                                            <div key={idx} class="p-2 bg-slate-950 rounded border border-slate-850 text-[11px] font-mono">
                                                <span class="text-[9px] text-blue-400 block font-bold">SLIDING WINDOW CONTEXT {idx+1}</span>
                                                "{ch}..."
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            {/* Dense embedding knowledge base vector search hit match card */}
                            <div class="bg-slate-900 p-4 rounded-lg border border-slate-800 space-y-2">
                                <span class="text-xs font-mono font-bold text-slate-400 block uppercase">Knowledge Base Vector Store Query Retrieval Match:</span>
                                <div class="bg-slate-950 p-4 rounded-xl border border-slate-850 flex flex-col sm:flex-row justify-between sm:items-center gap-4">
                                    <div class="space-y-1">
                                        <div class="flex items-center gap-2">
                                            <span class="bg-blue-950 text-blue-300 border border-blue-900 text-xs font-mono font-bold px-2 py-0.5 rounded">
                                                {pipelineData.vector_search_context.bug_id}
                                            </span>
                                            <span class="text-xs font-semibold text-white">
                                                {pipelineData.vector_search_context.repository} ({pipelineData.vector_search_context.component})
                                            </span>
                                        </div>
                                        <p class="text-xs text-slate-400 font-mono italic">"{pipelineData.vector_search_context.description}"</p>
                                    </div>
                                    <div class="text-left sm:text-right font-mono text-xs">
                                        <div class="font-bold text-blue-400">Similarity Match: {(pipelineData.vector_search_context.score * 100).toFixed(1)}%</div>
                                        <div class="text-[10px] text-slate-500 mt-0.5">Commit Hash Pointer: {pipelineData.vector_search_context.fix_commit}</div>
                                    </div>
                                </div>
                            </div>

                          </div>
                        )}

                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
